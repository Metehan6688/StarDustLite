sentence=CRC entegred UART communication protocol for telemetry and command exchange between a master and multiple slave devices.
paragraph=StarDustLite is a lightweight and efficient UART communication protocol designed for telemetry and command exchange between a master device and multiple slave devices. It incorporates CRC error checking to ensure data integrity during transmission. The library is customized StarDust library optimized for AVR like slow chips, etc. Main aim is communication with small bytes between devices, made for speed.
